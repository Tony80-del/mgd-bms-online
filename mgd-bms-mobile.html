<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg1:#030912;--bg2:#071325;--card:#0b1e3d;--cardh:#10274a;
  --blue:#00B4D8;--cyan:#06d6c7;--purple:#8b5cf6;
  --text1:#E8F4FF;--text2:#7FB3D8;--muted:#3D5A80;
  --border:#0f2d50;--green:#22c55e;--amber:#f59e0b;--red:#ef4444;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,'Segoe UI',sans-serif;
  background:var(--bg1);color:var(--text1);
  display:flex;flex-direction:column;
  height:100dvh;overflow:hidden;
  touch-action:manipulation;
}
.topbar{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;
  background:linear-gradient(135deg,#071325,#030912);
  border-bottom:1px solid var(--border);
  flex-shrink:0;position:sticky;top:0;z-index:20;
}
.topbar-title{
  font-size:16px;font-weight:700;
  background:linear-gradient(90deg,var(--cyan),var(--blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  flex:1;
}
.fa-btn{
  background:transparent;border:none;color:var(--text2);
  cursor:pointer;padding:4px 6px;font-size:18px;
}
.fa-btn:hover{color:var(--text1)}
.tabnav{
  display:flex;background:var(--bg2);
  border-bottom:1px solid var(--border);
  flex-shrink:0;overflow-x:auto;scrollbar-width:none;
}
.tabnav::-webkit-scrollbar{display:none}
.tab{
  flex:1;min-width:68px;padding:10px 6px;text-align:center;
  font-size:10px;color:var(--muted);cursor:pointer;
  border-bottom:2px solid transparent;transition:all .2s;
  display:flex;flex-direction:column;align-items:center;gap:3px;
  user-select:none;
}
.tab.active{color:var(--blue);border-bottom-color:var(--blue)}
.tab svg{width:20px;height:20px}
.tab .badge{
  font-size:9px;background:var(--card);padding:1px 5px;border-radius:8px;
  min-width:18px;text-align:center;
}
.tab.active .badge{background:rgba(0,180,216,0.2)}
.content{
  flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:12px 12px 80px;
}
.stat-row{
  display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px;
}
.stat-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:12px;padding:14px 12px;text-align:center;
}
.stat-card .label{font-size:10px;color:var(--muted);margin-bottom:4px}
.stat-card .val{font-size:22px;font-weight:700}
.c-blue{color:#60a5fa}.c-amber{color:#fbbf24}.c-green{color:#34d399}.c-red{color:#ef4444}
.item-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:14px;margin-bottom:10px;
  cursor:pointer;transition:all .2s;
}
.item-card:active{transform:scale(0.98)}
.item-card h3{font-size:14px;margin-bottom:4px}
.item-card .meta{font-size:11px;color:var(--text2);display:flex;flex-wrap:wrap;gap:4px 12px}
.badge-st{font-size:10px;padding:2px 8px;border-radius:10px;display:inline-block}
.st-open{background:rgba(0,180,216,.2);color:var(--blue)}
.st-won{background:rgba(34,197,94,.2);color:var(--green)}
.st-lost{background:rgba(239,68,68,.2);color:var(--red)}
.st-follow{background:rgba(245,158,11,.2);color:var(--amber)}
.st-pending{background:rgba(100,116,139,.3);color:#94a3b8}
.st-progress{background:rgba(0,180,216,.2);color:var(--blue)}
.st-done{background:rgba(34,197,94,.2);color:var(--green)}
.st-upcoming{background:rgba(0,180,216,.2);color:var(--blue)}
.st-attended{background:rgba(34,197,94,.2);color:var(--green)}
.page{display:none}.page.active{display:block}
.search-bar{
  display:flex;gap:8px;margin-bottom:12px;
}
.search-bar input{
  flex:1;background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:10px 14px;color:var(--text1);
  font-size:14px;outline:none;
}
.search-bar input::placeholder{color:var(--muted)}
.fab{
  position:fixed;bottom:80px;right:16px;
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--cyan),var(--blue));
  border:none;color:#fff;font-size:24px;
  cursor:pointer;z-index:10;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(0,180,216,0.3);
}
.fab:active{transform:scale(0.92)}
.fab-add{font-size:28px;line-height:1}

/* ── Modal / Form ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:30}
.overlay.open{display:block}
.modal{
  position:fixed;bottom:0;left:0;right:0;
  max-height:85vh;overflow-y:auto;
  background:var(--bg2);border-radius:16px 16px 0 0;
  padding:20px;z-index:35;transform:translateY(100%);
  transition:transform .3s;border-top:1px solid var(--border);
}
.modal.open{transform:translateY(0)}
.modal h2{font-size:16px;margin-bottom:16px;color:var(--cyan)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px}
.form-group input,.form-group select,.form-group textarea{
  width:100%;background:var(--card);border:1px solid var(--border);
  border-radius:10px;padding:10px 12px;color:var(--text1);
  font-size:14px;outline:none;
}
.form-group select{appearance:auto;color-scheme:dark}
.form-group textarea{min-height:60px;resize:vertical}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{
  border-color:var(--blue)
}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-row{display:flex;gap:10px;margin-top:6px}
.btn{padding:10px 20px;border-radius:10px;border:none;font-size:14px;cursor:pointer;flex:1}
.btn-primary{background:linear-gradient(135deg,var(--cyan),var(--blue));color:#fff}
.btn-secondary{background:var(--card);color:var(--text2);border:1px solid var(--border)}
.btn-danger{background:rgba(239,68,68,.2);color:var(--red)}

/* Modal delete confirm */
.delete-box{display:none;margin-top:12px;padding:12px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:10px;text-align:center}
.delete-box.show{display:block}
.delete-box p{font-size:12px;color:var(--red);margin-bottom:8px}
</style>

<script>
// ========================
// FIREBASE CONFIG
// ========================
const firebaseConfig = {
  apiKey: "AIzaSyCxBAFV5rhtnxPeTEIUBhxQq5kjBPMqscs",
  authDomain: "mgd-bms.firebaseapp.com",
  projectId: "mgd-bms",
  storageBucket: "mgd-bms.firebasestorage.app",
  messagingSenderId: "543698464482",
  appId: "1:543698464482:web:2f31825f40ecba5fe49a3b"
};

// ========================
// DATA & STATE
// ========================
let APP = {
  bids: [],
  contacts: [],
  events: [],
  tasks: [],
  interactions: [],
  currentTab: 'dashboard',
  editId: null,
  editType: null
};

// ========================
// UTILITY
// ========================
function id(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function today(){return new Date().toISOString().slice(0,10)}
function fmtDate(d){if(!d)return''; try{return new Date(d).toISOString().slice(0,10)}catch{return d}}
function badgeSt(status, map){
  const m={
    'In Progress':'st-progress','Won':'st-won','Lost':'st-lost',
    'Follow Up':'st-follow','Pending':'st-pending','Completed':'st-done',
    'Upcoming':'st-upcoming','Attended':'st-attended'
  };
  const cls=m[status]||'st-open';
  return `<span class="badge-st ${cls}">${status||'New'}</span>`;
}

// ========================
// FIREBASE INIT
// ========================
async function initFirebase(){
  if(typeof firebase !== 'undefined') return;
  await loadScript('https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js');
  await loadScript('https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js');
  await loadScript('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js');
  firebase.initializeApp(firebaseConfig);
  APP.db = firebase.firestore();
  APP.auth = firebase.auth();
}

function loadScript(src){
  return new Promise((ok,no)=>{
    const s = document.createElement('script');
    s.src = src; s.onload = ok; s.onerror = no;
    document.head.appendChild(s);
  });
}

// ========================
// AUTH
// ========================
async function ensureLogin(){
  try{
    await firebase.auth().signInWithEmailAndPassword('contact@mgd.com.vn','MGD2026');
  }catch(e){
    try{await firebase.auth().createUserWithEmailAndPassword('contact@mgd.com.vn','MGD2026');}
    catch(e2){}
  }
}

// ========================
// FIRESTORE SYNC
// ========================
function syncCollection(name, collectionName){
  if(!APP.db){initFirebase().then(()=>syncCollection(name,collectionName));return}
  ensureLogin().then(()=>{
    APP.db.collection(collectionName).onSnapshot(snap=>{
      APP[name] = snap.docs.map(d=>({id:d.id,...d.data()}));
      if(name==='bids') APP[name].sort((a,b)=>((b.createdAt||'')>(a.createdAt||'')?1:-1));
      else if(name==='tasks') APP[name].sort((a,b)=>a.createdAt>b.createdAt?-1:1);
      else APP[name].sort((a,b)=>((b.createdAt||'')>(a.createdAt||'')?1:-1));
      renderAll();
    }, e=>console.warn(name,'sync error',e));
  });
}

// ========================
// RENDER
// ========================
function renderAll(){
  renderDashboard();
  renderBids();
  renderContacts();
  renderEvents();
  renderTasks();
  renderInteractions();
  updateBadges();
}

function updateBadges(){
  document.getElementById('bidBadge').textContent = APP.bids.length;
  document.getElementById('contactBadge').textContent = APP.contacts.length;
  document.getElementById('eventBadge').textContent = APP.events.length;
  document.getElementById('taskBadge').textContent = APP.tasks.length;
  document.getElementById('interactBadge').textContent = APP.interactions.length;
}

function renderDashboard(){
  document.getElementById('dashBids').textContent = APP.bids.length;
  document.getElementById('dashContacts').textContent = APP.contacts.length;
  document.getElementById('dashEvents').textContent = APP.events.length;
  document.getElementById('dashTasks').textContent = APP.tasks.length;

  const el = document.getElementById('dashRecent');
  const all = [
    ...APP.bids.map(d=>({...d, _t:'Bid', _c:'bid'})),
    ...APP.events.map(d=>({...d, _t:'Event', _c:'events'})),
    ...APP.tasks.map(d=>({...d, _t:'Task', _c:'tasks'}))
  ].sort((a,b)=>((b.createdAt||'')>(a.createdAt||'')?1:-1)).slice(0,5);

  el.innerHTML = all.length ? all.map(i=>{
    let s = i.projectName||i.name||i.task||i.eventName||'(no name)';
    return `<div class="item-card" onclick="switchTab('${i._c}')" style="padding:10px 14px">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:13px;font-weight:600">${s}</span>
        <span style="font-size:10px;color:var(--muted)">${i._t}</span>
      </div>
    </div>`;
  }).join('') : '<div style="text-align:center;color:var(--muted);padding:20px;font-size:13px">No recent activity</div>';
}

function renderBids(){
  const el = document.getElementById('bidList');
  if(!APP.bids.length){el.innerHTML='<div style="text-align:center;color:var(--muted);padding:30px;font-size:13px">No bids yet</div>';return}
  el.innerHTML = APP.bids.map(i=>`
    <div class="item-card" onclick="openEditForm('bids','${i.id}')">
      <h3>${i.projectName||'Untitled'}</h3>
      <div class="meta">
        <span>${i.customer||'—'}</span>
        ${i.amount ? `<span>$ ${i.amount}</span>` : ''}
        ${badgeSt(i.status)}
        <span style="color:var(--muted)">${fmtDate(i.createdAt)}</span>
      </div>
    </div>
  `).join('');
}

function renderContacts(){
  const el = document.getElementById('contactList');
  const q = (document.getElementById('contactSearch').value||'').toLowerCase();
  let list = APP.contacts;
  if(q) list = list.filter(i=>(i.company||'').toLowerCase().includes(q)||(i.contact||'').toLowerCase().includes(q)||(i.phone||'').includes(q));
  if(!list.length){el.innerHTML='<div style="text-align:center;color:var(--muted);padding:30px;font-size:13px">No contacts found</div>';return}
  el.innerHTML = list.map(i=>`
    <div class="item-card" onclick="openEditForm('contacts','${i.id}')">
      <h3>${i.company||'Untitled'}</h3>
      <div class="meta">
        <span>${i.contact||'—'}</span>
        <span>${i.phone||''}</span>
        <span>${i.email||''}</span>
      </div>
    </div>
  `).join('');
}

function renderEvents(){
  const el = document.getElementById('eventList');
  if(!APP.events.length){el.innerHTML='<div style="text-align:center;color:var(--muted);padding:30px;font-size:13px">No events yet</div>';return}
  el.innerHTML = APP.events.map(i=>`
    <div class="item-card" onclick="openEditForm('events','${i.id}')">
      <h3>${i.eventName||'Untitled'}</h3>
      <div class="meta">
        <span>📅 ${fmtDate(i.eventDate)}</span>
        <span>📌 ${i.location||'—'}</span>
        ${badgeSt(i.status)}
      </div>
    </div>
  `).join('');
}

function renderTasks(){
  const el = document.getElementById('taskList');
  if(!APP.tasks.length){el.innerHTML='<div style="text-align:center;color:var(--muted);padding:30px;font-size:13px">No tasks yet</div>';return}
  el.innerHTML = APP.tasks.map(i=>`
    <div class="item-card" onclick="openEditForm('tasks','${i.id}')">
      <h3>${i.task||'Untitled'}</h3>
      <div class="meta">
        <span>📅 ${fmtDate(i.deadline)}</span>
        <span>👤 ${i.pic||'—'}</span>
        ${badgeSt(i.status)}
      </div>
    </div>
  `).join('');
}

function renderInteractions(){
  const el = document.getElementById('interactList');
  if(!APP.interactions.length){el.innerHTML='<div style="text-align:center;color:var(--muted);padding:30px;font-size:13px">No interactions yet</div>';return}
  el.innerHTML = APP.interactions.map(i=>`
    <div class="item-card" onclick="openEditForm('interactions','${i.id}')">
      <h3>${i.customerName||'—'}</h3>
      <div class="meta">
        <span>📅 ${fmtDate(i.date||i.createdAt)}</span>
        <span>${i.type||'—'}</span>
        <span>${i.pic||'—'}</span>
      </div>
      <div style="font-size:12px;color:var(--text2);margin-top:4px">${(i.content||'').slice(0,80)}</div>
    </div>
  `).join('');
}

// ========================
// TAB SWITCH
// ========================
function switchTab(tab){
  APP.currentTab = tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id==='page'+tab.charAt(0).toUpperCase()+tab.slice(1)));
  document.getElementById('contentArea').scrollTop = 0;
}

// ========================
// ADD / EDIT FORMS
// ========================
function openAddForm(){
  const tab = APP.currentTab;
  APP.editId = null;
  APP.editType = tab;
  showForm(tab);
}

function openEditForm(type, id){
  APP.editId = id;
  APP.editType = type;
  showForm(type, id);
}

function showForm(type, id){
  const overlay = document.getElementById('overlay');
  const modal = document.getElementById('modal');
  const title = document.getElementById('modalTitle');
  const body = document.getElementById('modalBody');

  let item = id ? APP[type].find(i=>i.id===id) : null;
  title.textContent = id ? 'Edit' : 'New';

  if(type==='bids'){
    title.textContent = id ? 'Edit Bid' : 'New Bid';
    body.innerHTML = `
      <div class="form-group"><label>Project Name</label><input id="f_projectName" value="${item?.projectName||''}"></div>
      <div class="form-row">
        <div class="form-group"><label>Customer</label><input id="f_customer" value="${item?.customer||''}"></div>
        <div class="form-group"><label>Amount ($)</label><input id="f_amount" type="number" value="${item?.amount||''}"></div>
      </div>
      <div class="form-group"><label>Status</label>
        <select id="f_status">
          <option value="In Progress" ${item?.status==='In Progress'?'selected':''}>In Progress</option>
          <option value="Won" ${item?.status==='Won'?'selected':''}>Won</option>
          <option value="Lost" ${item?.status==='Lost'?'selected':''}>Lost</option>
          <option value="Follow Up" ${item?.status==='Follow Up'?'selected':''}>Follow Up</option>
        </select>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="saveForm('bids')">Save</button>
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      </div>
      ${id ? `<div id="deleteBidArea" style="margin-top:12px"><button class="btn btn-danger" onclick="showDeleteConfirm('bids','${id}')">Delete</button></div>` : ''}
      <div id="delConfirmBids" class="delete-box"><p>Delete this bid?</p><div class="btn-row"><button class="btn btn-danger" onclick="deleteItem('bids','${id}')">Confirm</button><button class="btn btn-secondary" onclick="hideDeleteConfirm('bids')">No</button></div></div>
    `;
  } else if(type==='contacts'){
    title.textContent = id ? 'Edit Contact' : 'New Contact';
    body.innerHTML = `
      <div class="form-group"><label>Company</label><input id="f_company" value="${item?.company||''}"></div>
      <div class="form-group"><label>Contact Person</label><input id="f_contact" value="${item?.contact||''}"></div>
      <div class="form-row">
        <div class="form-group"><label>Phone</label><input id="f_phone" value="${item?.phone||''}"></div>
        <div class="form-group"><label>Email</label><input id="f_email" value="${item?.email||''}"></div>
      </div>
      <div class="form-group"><label>Country</label><input id="f_country" value="${item?.country||''}"></div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="saveForm('contacts')">Save</button>
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      </div>
      ${id ? `<div id="deleteContactArea" style="margin-top:12px"><button class="btn btn-danger" onclick="showDeleteConfirm('contacts','${id}')">Delete</button></div>` : ''}
      <div id="delConfirmContacts" class="delete-box"><p>Delete this contact?</p><div class="btn-row"><button class="btn btn-danger" onclick="deleteItem('contacts','${id}')">Confirm</button><button class="btn btn-secondary" onclick="hideDeleteConfirm('contacts')">No</button></div></div>
    `;
  } else if(type==='events'){
    title.textContent = id ? 'Edit Event' : 'New Event';
    body.innerHTML = `
      <div class="form-group"><label>Event Name</label><input id="f_eventName" value="${item?.eventName||''}"></div>
      <div class="form-row">
        <div class="form-group"><label>Date</label><input id="f_eventDate" type="date" value="${fmtDate(item?.eventDate)||today()}"></div>
        <div class="form-group"><label>Location</label><input id="f_location" value="${item?.location||''}"></div>
      </div>
      <div class="form-group"><label>Status</label>
        <select id="f_eventStatus">
          <option value="Upcoming" ${item?.status==='Upcoming'?'selected':''}>Upcoming</option>
          <option value="Attended" ${item?.status==='Attended'?'selected':''}>Attended</option>
        </select>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="saveForm('events')">Save</button>
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      </div>
      ${id ? `<div id="deleteEventArea" style="margin-top:12px"><button class="btn btn-danger" onclick="showDeleteConfirm('events','${id}')">Delete</button></div>` : ''}
      <div id="delConfirmEvents" class="delete-box"><p>Delete this event?</p><div class="btn-row"><button class="btn btn-danger" onclick="deleteItem('events','${id}')">Confirm</button><button class="btn btn-secondary" onclick="hideDeleteConfirm('events')">No</button></div></div>
    `;
  } else if(type==='tasks'){
    title.textContent = id ? 'Edit Task' : 'New Task';
    body.innerHTML = `
      <div class="form-group"><label>Task</label><textarea id="f_task">${item?.task||''}</textarea></div>
      <div class="form-row">
        <div class="form-group"><label>Deadline</label><input id="f_deadline" type="date" value="${fmtDate(item?.deadline)||today()}"></div>
        <div class="form-group"><label>PIC</label><input id="f_pic" value="${item?.pic||''}"></div>
      </div>
      <div class="form-group"><label>Status</label>
        <select id="f_taskStatus">
          <option value="Pending" ${item?.status==='Pending'?'selected':''}>Pending</option>
          <option value="In Progress" ${item?.status==='In Progress'?'selected':''}>In Progress</option>
          <option value="Completed" ${item?.status==='Completed'?'selected':''}>Completed</option>
        </select>
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="saveForm('tasks')">Save</button>
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      </div>
      ${id ? `<div id="deleteTaskArea" style="margin-top:12px"><button class="btn btn-danger" onclick="showDeleteConfirm('tasks','${id}')">Delete</button></div>` : ''}
      <div id="delConfirmTasks" class="delete-box"><p>Delete this task?</p><div class="btn-row"><button class="btn btn-danger" onclick="deleteItem('tasks','${id}')">Confirm</button><button class="btn btn-secondary" onclick="hideDeleteConfirm('tasks')">No</button></div></div>
    `;
  } else if(type==='interactions'){
    title.textContent = id ? 'Edit Interaction' : 'New Interaction';
    body.innerHTML = `
      <div class="form-group"><label>Customer</label><input id="f_customerName" value="${item?.customerName||''}"></div>
      <div class="form-row">
        <div class="form-group"><label>Date</label><input id="f_interactDate" type="date" value="${fmtDate(item?.date||item?.createdAt)||today()}"></div>
        <div class="form-group"><label>Type</label>
          <select id="f_interactType">
            <option value="Meeting" ${item?.type==='Meeting'?'selected':''}>Meeting</option>
            <option value="Phone" ${item?.type==='Phone'?'selected':''}>Phone</option>
            <option value="Email" ${item?.type==='Email'?'selected':''}>Email</option>
            <option value="Other" ${item?.type==='Other'?'selected':''}>Other</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label>Content</label><textarea id="f_content">${item?.content||''}</textarea></div>
      <div class="form-group"><label>PIC</label><input id="f_picInteract" value="${item?.pic||''}"></div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="saveForm('interactions')">Save</button>
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      </div>
      ${id ? `<div id="deleteInteractArea" style="margin-top:12px"><button class="btn btn-danger" onclick="showDeleteConfirm('interactions','${id}')">Delete</button></div>` : ''}
      <div id="delConfirmInteractions" class="delete-box"><p>Delete this interaction?</p><div class="btn-row"><button class="btn btn-danger" onclick="deleteItem('interactions','${id}')">Confirm</button><button class="btn btn-secondary" onclick="hideDeleteConfirm('interactions')">No</button></div></div>
    `;
  }

  overlay.classList.add('open');
  modal.classList.add('open');
}

function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('modal').classList.remove('open');
}

function showDeleteConfirm(type, id){
  document.getElementById('delConfirm'+type.charAt(0).toUpperCase()+type.slice(1)).classList.add('show');
}
function hideDeleteConfirm(type){
  document.getElementById('delConfirm'+type.charAt(0).toUpperCase()+type.slice(1)).classList.remove('show');
}

// ========================
// SAVE TO FIRESTORE
// ========================
async function saveForm(type){
  const isEdit = !!APP.editId;
  const data = {};
  if(type==='bids'){
    data.projectName = document.getElementById('f_projectName').value;
    data.customer = document.getElementById('f_customer').value;
    data.amount = parseFloat(document.getElementById('f_amount').value)||0;
    data.status = document.getElementById('f_status').value;
  } else if(type==='contacts'){
    data.company = document.getElementById('f_company').value;
    data.contact = document.getElementById('f_contact').value;
    data.phone = document.getElementById('f_phone').value;
    data.email = document.getElementById('f_email').value;
    data.country = document.getElementById('f_country').value;
  } else if(type==='events'){
    data.eventName = document.getElementById('f_eventName').value;
    data.eventDate = document.getElementById('f_eventDate').value;
    data.location = document.getElementById('f_location').value;
    data.status = document.getElementById('f_eventStatus').value;
  } else if(type==='tasks'){
    data.task = document.getElementById('f_task').value;
    data.deadline = document.getElementById('f_deadline').value;
    data.pic = document.getElementById('f_pic').value;
    data.status = document.getElementById('f_taskStatus').value;
  } else if(type==='interactions'){
    data.customerName = document.getElementById('f_customerName').value;
    data.date = document.getElementById('f_interactDate').value;
    data.type = document.getElementById('f_interactType').value;
    data.content = document.getElementById('f_content').value;
    data.pic = document.getElementById('f_picInteract').value;
  }

  data.updatedAt = new Date().toISOString();
  if(!isEdit) data.createdAt = new Date().toISOString();
  else data.createdAt = APP[type].find(i=>i.id===APP.editId)?.createdAt || data.updatedAt;

  try{
    const collectionMap = {
      bids:'bids', contacts:'contacts', events:'events',
      tasks:'tasks', interactions:'interactions'
    };
    const col = APP.db.collection(collectionMap[type]);
    if(isEdit) await col.doc(APP.editId).update(data);
    else await col.add(data);
    closeModal();
  }catch(e){alert('Save error: '+e.message)}
}

// ========================
// DELETE
// ========================
async function deleteItem(type, id){
  const collectionMap = {
    bids:'bids', contacts:'contacts', events:'events',
    tasks:'tasks', interactions:'interactions'
  };
  try{
    await APP.db.collection(collectionMap[type]).doc(id).delete();
    closeModal();
  }catch(e){alert('Delete error: '+e.message)}
}

// ========================
// SYNC
// ========================
function forceSync(){renderAll()}

// ========================
// INIT
// ========================
async function init(){
  await initFirebase();
  await ensureLogin();
  syncCollection('bids','bids');
  syncCollection('contacts','contacts');
  syncCollection('events','events');
  syncCollection('tasks','tasks');
  syncCollection('interactions','interactions');
}
init();
</script>
</body>
