<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MGD BMS — Mobile</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0E1116;--panel:#161B22;--card:#1C2330;--card2:#243040;
  --line:#2D3A4A;--txt:#E6EDF3;--mut:#8B949E;--acc:#00C7B7;--acc2:#009E92;
  --red:#F85149;--org:#FF8C42;--yel:#E3B341;--grn:#3FB950;--blu:#58A6FF;--gry:#6E7681;--pur:#BC8CFF;
}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  font-size:14px;overflow-x:hidden}
#app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);
  position:relative;display:flex;flex-direction:column}

/* ── Top Bar ── */
.topbar{
  position:sticky;top:0;z-index:30;
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;background:linear-gradient(180deg,#11161D,#0E1116);
  border-bottom:1px solid var(--line);backdrop-filter:blur(10px)
}
.topbar .logo{font-size:17px;font-weight:700;flex:1;white-space:nowrap}
.topbar .logo .dot{color:var(--acc)}
.lang-btn{
  font-size:11px;font-weight:600;padding:4px 9px;border-radius:8px;
  border:1px solid var(--line);background:var(--card);color:var(--mut);cursor:pointer;
  white-space:nowrap
}
.lang-btn.active{background:var(--acc);color:#04201d;border-color:var(--acc)}
.conn{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mut);white-space:nowrap}
.conn .led{width:8px;height:8px;border-radius:50%;background:var(--gry)}
.conn .led.on{background:var(--grn);box-shadow:0 0 6px var(--grn)}
.conn .led.err{background:var(--red)}

/* ── Bottom Nav ── */
.tabnav{
  position:sticky;bottom:0;z-index:30;
  display:flex;background:#0B0E13;
  border-top:1px solid var(--line);padding:5px 2px
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;
  padding:5px 0;color:var(--mut);font-size:10px;cursor:pointer;position:relative;user-select:none
}
.tab .ti{font-size:20px;line-height:1}
.tab.active{color:var(--acc)}
.tab .badge{
  position:absolute;top:1px;right:50%;margin-right:-16px;
  background:var(--acc);color:#04201d;font-size:9px;font-weight:700;
  border-radius:9px;padding:0 5px;min-width:15px;text-align:center;display:none
}
.tab .badge.warn{background:var(--org);color:#1a0a00}

/* ── Screens ── */
.screen{flex:1;overflow-y:auto;padding:12px 14px 90px;display:none}
.screen.active{display:block}

/* ── Section Title ── */
.sec-title{
  font-size:11px;color:var(--mut);text-transform:uppercase;
  letter-spacing:.8px;margin:16px 0 7px;font-weight:600
}
.sec-title:first-child{margin-top:2px}

/* ── Stat Grid (Dashboard) ── */
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.stat{
  background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:11px 12px;cursor:pointer;transition:border-color .15s
}
.stat:active{border-color:var(--acc)}
.stat .h{font-size:11px;color:var(--mut);font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:5px}
.stat .big{font-size:28px;font-weight:700;margin:2px 0}
.stat .sub{display:flex;flex-wrap:wrap;gap:6px 10px;font-size:11px;color:var(--mut);margin-top:3px}
.stat .sub b{color:var(--txt);font-weight:600}
.stat.full{grid-column:1/-1}
.stat.accent{border-color:var(--acc);background:linear-gradient(135deg,#13252a,#1C2330)}

/* ── Reminder Banner ── */
.banner{
  background:linear-gradient(135deg,#3a1d00,#2a1500);
  border:1px solid var(--org);color:#ffd9b0;border-radius:12px;
  padding:9px 12px;margin:6px 0;font-size:12px;display:flex;align-items:center;gap:8px
}
.banner.red{background:linear-gradient(135deg,#3a0000,#2a0000);border-color:var(--red);color:#ffb3ae}
.banner .msg{flex:1;line-height:1.4}
.banner .tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
.banner .tag.ov{background:rgba(248,81,73,.25);color:var(--red)}
.banner .tag.d2{background:rgba(255,140,66,.25);color:var(--org)}
.banner .del{margin-left:auto;color:var(--mut);cursor:pointer;font-size:13px;padding:0 4px}

/* ── Activity Feed ── */
.activity{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.act{
  display:flex;align-items:center;gap:10px;padding:10px 12px;
  border-bottom:1px solid var(--line)
}
.act:last-child{border-bottom:none}
.act .ic{
  width:28px;height:28px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:13px;background:var(--card2);flex-shrink:0
}
.act .tx{flex:1;min-width:0}
.act .tx .title{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.act .tx .sub{font-size:11px;color:var(--mut);margin-top:1px}
.act .dt{font-size:11px;color:var(--mut);white-space:nowrap;flex-shrink:0}

/* ── Quick Actions ── */
.quick-actions{display:flex;gap:8px;margin-top:4px}
.qa{
  flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;
  padding:10px 8px;text-align:center;cursor:pointer;font-size:12px;font-weight:600;
  color:var(--mut);transition:border-color .15s,color .15s
}
.qa:active{border-color:var(--acc);color:var(--acc)}
.qa .ic{display:block;font-size:20px;margin-bottom:3px}

/* ── List Cards ── */
.search{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.search input{
  flex:1;min-width:0;background:var(--card);border:1px solid var(--line);
  color:var(--txt);border-radius:10px;padding:9px 11px;font-size:13px
}
.search select{
  background:var(--card);border:1px solid var(--line);color:var(--txt);
  border-radius:10px;padding:9px 8px;font-size:13px
}
.list{display:flex;flex-direction:column;gap:9px}
.item{
  background:var(--card);border:1px solid var(--line);border-radius:14px;
  padding:12px;cursor:pointer;transition:border-color .15s
}
.item:active{border-color:var(--acc);background:var(--card2)}
.item .row1{display:flex;align-items:center;gap:7px;margin-bottom:5px;min-width:0}
.item .name{font-weight:600;font-size:14px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item .meta{font-size:12px;color:var(--mut);display:flex;flex-wrap:wrap;gap:3px 10px}
.item .meta b{color:var(--txt);font-weight:600}
.item .edit{
  position:absolute;top:10px;right:10px;
  color:var(--mut);font-size:11px;background:var(--card2);
  border:1px solid var(--line);border-radius:7px;padding:3px 8px;cursor:pointer
}
.item{position:relative}
.item:hover .edit{display:block}

/* ── Pill Badges ── */
.pill{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;white-space:nowrap;display:inline-block}
.p-Bidding,.p-Upcoming,.p-Meeting,.p-Blue{background:rgba(88,166,255,.18);color:var(--blu)}
.p-Won,.p-Attended,.p-Completed,.p-Green{background:rgba(63,185,80,.18);color:var(--grn)}
.p-Lost,.p-Overdue,.p-Red{background:rgba(248,81,73,.18);color:var(--red)}
.p-Following,.p-Medium,.p-Pending,.p-Yellow,.p-进行中,.p-In{background:rgba(227,179,65,.18);color:var(--yel)}
.p-Reviewing,.p-PQ,.p-Purple{background:rgba(188,140,255,.18);color:var(--pur)}
.p-High,.p-高,.p-高High{background:rgba(248,81,73,.18);color:var(--red)}
.p-Low,.p-Low,.p-Grey{background:rgba(110,118,129,.20);color:var(--gry)}
.p-中,.p-Medium,.p-MediumMedium{background:rgba(227,179,65,.18);color:var(--yel)}
.p-due2,.p-Orange{background:rgba(255,140,66,.18);color:var(--org)}
.p-资料收集,.p-Data{background:rgba(188,140,255,.18);color:var(--pur)}
.p-投标中,.p-BiddingBidding{background:rgba(88,166,255,.18);color:var(--blu)}

/* ── FAB ── */
.fab{
  position:fixed;bottom:68px;right:max(14px,calc(50% - 215px + 14px));z-index:40;
  width:56px;height:56px;border-radius:50%;background:var(--acc);color:#04201d;
  font-size:26px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 18px rgba(0,199,183,.4);cursor:pointer
}
.fab:active{transform:scale(.93)}

/* ── Modal Form ── */
.modal{
  position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.65);
  display:none;align-items:flex-end
}
.modal.show{display:flex}
.sheet{
  background:var(--panel);width:100%;max-width:430px;margin:0 auto;
  border-radius:18px 18px 0 0;max-height:92vh;overflow-y:auto;
  padding:16px 16px 32px;border-top:1px solid var(--line)
}
.sheet h3{
  margin:2px 0 14px;font-size:16px;font-weight:700;
  display:flex;align-items:center;gap:8px
}
.sheet h3 .x{margin-left:auto;color:var(--mut);cursor:pointer;font-size:22px;font-weight:400;line-height:1}
.fld{margin-bottom:11px}
.fld label{display:block;font-size:12px;color:var(--mut);margin-bottom:5px;font-weight:600}
.fld label .req{color:var(--red)}
.fld input,.fld select,.fld textarea{
  width:100%;background:var(--card);border:1px solid var(--line);color:var(--txt);
  border-radius:10px;padding:10px 12px;font-size:14px;font-family:inherit
}
.fld textarea{resize:vertical;min-height:68px}
.fld.row2{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.btnrow{display:flex;gap:9px;margin-top:8px}
.btn{flex:1;padding:12px;border-radius:11px;font-size:14px;font-weight:600;border:1px solid var(--line);cursor:pointer}
.btn.primary{background:var(--acc);color:#04201d;border-color:var(--acc)}
.btn.ghost{background:transparent;color:var(--txt)}
.btn.danger{background:rgba(248,81,73,.12);color:var(--red);border-color:rgba(248,81,73,.4);flex:0 0 auto;padding:12px 16px}
.btn:active{transform:scale(.97)}

/* ── Toast ── */
.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);
  z-index:60;background:var(--card2);border:1px solid var(--line);color:var(--txt);
  padding:10px 18px;border-radius:24px;font-size:13px;opacity:0;
  transition:.25s;pointer-events:none;max-width:90%;white-space:nowrap
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{border-color:var(--red);color:#ffb3ae}

/* ── Empty ── */
.empty{text-align:center;color:var(--mut);padding:36px 0;font-size:13px;line-height:1.6}

/* ── Title bar for list screen ── */
.screen-head{display:flex;align-items:center;margin-bottom:10px;gap:10px}
.screen-head h2{flex:1;margin:0;font-size:18px;font-weight:700}

/* ── Filter pill row ── */
.filter-row{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap}
.fp{
  font-size:12px;font-weight:600;padding:5px 13px;border-radius:20px;
  border:1px solid var(--line);background:var(--card);color:var(--mut);cursor:pointer
}
.fp.active{background:var(--acc);color:#04201d;border-color:var(--acc)}
</style>
</head>
<body>
<div id="app">

  <!-- ══ Top Bar ══ -->
  <div class="topbar">
    <div class="logo">🔄 MGD<span class="dot">·</span>BMS</div>
    <button class="lang-btn" id="lzh" onclick="setLang('zh')">中文</button>
    <button class="lang-btn" id="len" onclick="setLang('en')">EN</button>
    <div class="conn"><span class="led" id="led"></span><span id="connTxt">—</span></div>
  </div>

  <!-- ══ HOME / DASHBOARD ══ -->
  <div class="screen active" id="scr-home">
    <div class="sec-title" id="home-greet">综合概览</div>
    <div class="statgrid" id="dashStats"></div>

    <div class="sec-title" id="sec-remind">⚠️ 待办提醒</div>
    <div id="dashReminders"></div>

    <div class="sec-title" id="sec-rec">📋 最近动态</div>
    <div class="activity" id="dashActivity"></div>
  </div>

  <!-- ══ BIDS ══ -->
  <div class="screen" id="scr-bids">
    <div class="screen-head">
      <h2 id="ttl-bids">投标项目</h2>
    </div>
    <div class="search">
      <input id="bidSearch" placeholder="🔍 搜索项目 / 客户…">
      <select id="bidFilter"><option value="">全部</option><option value="Bidding">投标中</option><option value="Tracking">跟踪</option><option value="Other">其他</option></select>
    </div>
    <div class="list" id="listBids"></div>
  </div>

  <!-- ══ CUSTOMERS ══ -->
  <div class="screen" id="scr-customers">
    <div class="screen-head">
      <h2 id="ttl-customers">客户管理</h2>
    </div>
    <div class="search">
      <input id="conSearch" placeholder="🔍 搜索公司 / 联系人…">
      <select id="conFilter"><option value="">全部</option><option value="High">高 High</option><option value="Medium">中 Medium</option><option value="Low">低 Low</option></select>
    </div>
    <div class="list" id="listCustomers"></div>
  </div>

  <!-- ══ INTERACTIONS ══ -->
  <div class="screen" id="scr-inter">
    <div class="screen-head">
      <h2 id="ttl-inter">客户互动</h2>
    </div>
    <div class="search">
      <input id="intSearch" placeholder="🔍 搜索客户 / 内容…">
      <select id="intFilter"><option value="">全部</option><option>已完成</option><option>进行中</option><option>待跟进</option></select>
    </div>
    <div class="list" id="listInter"></div>
  </div>

  <!-- ══ CHAMBERS ══ -->
  <div class="screen" id="scr-chambers">
    <div class="screen-head">
      <h2 id="ttl-chambers">商会信息</h2>
    </div>
    <div class="search">
      <input id="chSearch" placeholder="🔍 搜索商会 / 主题…">
      <select id="chFilter"><option value="">全部</option><option value="Upcoming">即将出席</option><option value="Attended">已出席</option></select>
    </div>
    <div class="list" id="listChambers"></div>
  </div>


  <!-- ══ Weekly Report Screen ══ -->
  <div class="screen" id="scr-report">
    <div class="screen-head">
      <h2 id="ttl-report">Weekly Report · 周报</h2>
    </div>
    <!-- Week Navigator -->
    <div style="display:flex;align-items:center;justify-content:center;gap:12px;padding:8px 16px;background:#1a1f2e;border-bottom:1px solid #2a3040;">
      <button class="btn-icon" onclick="changeReportWeek(-1)" style="background:#1e2433;color:#00C7B7;font-size:16px;padding:6px 12px;border-radius:6px;border:1px solid #2a3040;">‹</button>
      <span id="reportWeekLabel" style="color:#00C7B7;font-size:13px;font-weight:600;min-width:160px;text-align:center;">W28 · 2026年7月13日-19日</span>
      <button class="btn-icon" onclick="changeReportWeek(1)" style="background:#1e2433;color:#00C7B7;font-size:16px;padding:6px 12px;border-radius:6px;border:1px solid #2a3040;">›</button>
    </div>
    <!-- Person Selector -->
    <div id="reportPersonBtns" style="display:flex;gap:4px;padding:10px 14px;background:#0E1116;border-bottom:1px solid #2a3040;"></div>
    <div id="reportContent" style="padding:12px 14px 80px;overflow-y:auto;">
      <!-- KPIs -->
      <div id="reportKPIs" style="margin-bottom:14px;"></div>
      <!-- Detail Sections -->
      <div id="reportDetails"></div>
    </div>
  </div>

  <!-- ══ Bottom Nav ══ -->
  <div class="tabnav">
    <div class="tab active" data-tab="home">
      <div class="ti">📊</div>Home<span class="badge" id="b-home"></span>
    </div>
    <div class="tab" data-tab="bids">
      <div class="ti">📋</div><span id="lbl-bids">投标</span><span class="badge" id="b-bids">0</span>
    </div>
    <div class="tab" data-tab="customers">
      <div class="ti">👥</div><span id="lbl-customers">客户</span><span class="badge" id="b-customers">0</span>
    </div>
    <div class="tab" data-tab="inter">
      <div class="ti">💬</div><span id="lbl-inter">互动</span><span class="badge" id="b-inter">0</span>
    </div>
    <div class="tab" data-tab="report">
      <div class="ti">📑</div><span id="lbl-report">周报</span>
    </div>
    <div class="tab" data-tab="chambers">
      <div class="ti">🏛️</div><span id="lbl-chambers">商会</span><span class="badge" id="b-chambers">0</span>
    </div>
  </div>

  <!-- ══ FAB ══ -->
  <div class="fab" id="fab" onclick="fabAction()">+</div>

  <!-- ══ Modal Form ══ -->
  <div class="modal" id="modal" onclick="if(event.target===this)closeForm()">
    <div class="sheet" onclick="event.stopPropagation()">
      <h3 id="formTitle">新增</h3>
      <form id="formBody" onsubmit="event.preventDefault();doSave()"></form>
    </div>
  </div>

  <!-- ══ Toast ══ -->
  <div class="toast" id="toast"></div>
</div>

window._demoReady=false;
window.initFirebase=function(){};
window.firebase={
initializeApp:function(){},
auth:function(){
return{

};},
firestore:function(){
return{
collection:function(){
return{
add:function(){return Promise.resolve({id:'mock'});},
doc:function(id){
var _d=null,_cbs=[];
return{
set:function(d){_d=(d.data||d);setTimeout(function(){_cbs.forEach(function(c){c({data:function(){return _d;},exists:true});});},50);return Promise.resolve();},

};},

where:function(){return this;},
orderBy:function(){return this;},
limit:function(){return this;}
};}
};}
};

const $=s=>document.querySelector(s);
const uid=()=>crypto.randomUUID?crypto.randomUUID():'id'+Date.now()+Math.random().toString(16).slice(2);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt=d=>{if(!d)return'—';const d2=new Date(d+"T00:00:00");if(isNaN(d2))return d;return d2.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});};
const daysLeft=d=>{
  if(!d)return 9999;
  const d2=new Date(d+"T00:00:00");
  if(isNaN(d2))return 9999;
  return Math.round((d2-TODAY)/86400000);
};
const sameMonth=(d,ref)=>{
  if(!d)return false;
  const d2=new Date(d+"T00:00:00");
  if(isNaN(d2))return false;
  return ref?d2.getMonth()===ref.getMonth()&&d2.getFullYear()===ref.getFullYear():d2.getMonth()===NOW.getMonth()&&d2.getFullYear()===NOW.getFullYear();
};
const fmtV=n=>{
  if(!n||isNaN(n))return'—';
  const v=Number(n);
  if(v>=1e9)return(v/1e9).toFixed(1).replace(/\.0$/,'')+'B';
  if(v>=1e6)return(v/1e6).toFixed(1).replace(/\.0$/,'')+'M';
  if(v>=1e3)return(v/1e3).toFixed(1).replace(/\.0$/,'')+'K';
  return v.toLocaleString();
};
const pill=(cls,txt)=>'<span class="pill p-'+esc(cls)+'">'+esc(txt)+'</span>';

function toast(msg,err){
  const t=$('#toast');
  t.textContent=msg;t.className='toast show'+(err?' err':'');
  clearTimeout(t._t);t._t=setTimeout(()=>t.className='toast'+(err?' err':''),2500);
}

async function initFirebase(){
  APP.db=firebase.firestore();
  setConn('connecting');
  try{
    await firebase.auth().signInWithEmailAndPassword("tong@mgd.com","MGD2024!");
  }catch(e){
    try{await firebase.auth().createUserWithEmailAndPassword("tong@mgd.com","MGD2024!");}
    catch(e2){/* may already exist */}
  }
  APP.db.collection('bms_data').doc('master').onSnapshot(snap=>{
    if(!snap.exists)return;
    if(window._demoReady){setConn('online');return;}
    APP.data=snap.data().data||{bids:[],customers:[],projects:[],chambers:[]};
    ensureArrays();
    setConn('online');
    renderAll();
  },err=>{setConn('err');console.error('sync err',err);});
  await loadOnce();
}

async function loadOnce(){
  if(window._demoReady)return;
  try{
    const snap=await APP.db.collection('bms_data').doc('master').get();
    if(snap.exists){
      APP.data=snap.data().data||{bids:[],customers:[],projects:[],chambers:[]};
      ensureArrays();setConn('online');renderAll();
    } else {
      APP.data={bids:[],customers:[],projects:[],chambers:[]};ensureArrays();setConn('online');renderAll();
    }
  }catch(e){setConn('err');toast('Load failed: '+e.message,true);}
}

function ensureArrays(){
  ['bids','customers','projects','chambers'].forEach(k=>{
    if(!APP.data[k])APP.data[k]=[];
    APP.data[k].forEach(it=>{if(!it.id)it.id=uid();});
  });
}

async function saveData(){
  if(!APP.db)return;
  APP.busy=true;
  try{
    await APP.db.collection('bms_data').doc('master').set({
      data:APP.data,
      updatedBy:'mobile-v3',
      updatedAt:new Date().toISOString()
    });
  }catch(e){toast('Save failed: '+e.message,true);}
  APP.busy=false;
}

function setConn(s){
  const led=$('#led'),txt=$('#connTxt');
  led.className='led'+(s==='online'?' on':s==='err'?' err':'');
  txt.textContent=s==='online'?(lang==='zh'?'已同步':'Synced'):s==='err'?(lang==='zh'?'离线':'Offline'):'…';
}

// contentStageMap — 与网页端完全一致
const stageMap={
  '投标中':'bidding','投标中 / Bidding':'bidding','Bidding':'bidding','Bidding / 投标中':'bidding',
  '跟踪':'tracking','跟踪 / Following':'tracking','Following':'tracking','Following / 跟踪':'tracking'
};
const stageMap2={
  '评审中':'reviewing','评审中 / Reviewing':'reviewing','Reviewing':'reviewing','Reviewing / 评审中':'reviewing',
  '中标':'won','中标 / Won':'won','Won':'won','Won / 中标':'won',
  '资料收集':'pq','资格审核':'pq',
  '资格审核 / PQ':'pq','PQ / 资格审核':'pq'
};

function renderDashboard(){
  const bids=APP.data.bids||[];
  const cust=APP.data.customers||[];
  const proj=(APP.data.projects||[]);
  const chambers=APP.data.chambers||[];

  // Bids stats
  const bTotal=bids.length;
  const bActive=bids.filter(b=>stageMap[b.stageContent||b.stage||'']==='bidding'&&!b.inactive).length;
  const bFollow=bids.filter(b=>stageMap[b.stageContent||b.stage||'']==='tracking'&&!b.inactive).length;
  const totalVal=bids.filter(b=>!b.inactive).reduce((s,b)=>{const v=parseFloat(String(b.estimatedValue||0).replace(/,/g,''));return s+(isNaN(v)?0:v);},0);

  // Customer stats
  const cNewJul=cust.filter(c=>sameMonth(c.createdDate)).length;
  const cHigh=cust.filter(c=>/高|High/i.test(c.priority||'')).length;

  // Interactions
  const iJul=proj.filter(p=>sameMonth(p.interactionDate)).length;

  // Chambers
  const chUpc=chambers.filter(ch=>daysLeft(ch.attendanceDate)>0).length;

  // Tasks from Interactions (projects has status field)
  const tasks=proj;
  const taskOver=tasks.filter(t=>t.status&&!t.status.includes(isZh?'完成':'Completed')&&daysLeft(t.nextActionDate||t.interactionDate)<0).length;
  const taskDue=tasks.filter(t=>t.status&&!t.status.includes(isZh?'完成':'Completed')&&daysLeft(t.nextActionDate||t.interactionDate)<=7&&daysLeft(t.nextActionDate||t.interactionDate)>=0).length;

  const stats=[
    {t:T('dashBids'),big:bTotal,sub:[[T('dashBidsActive'),bActive],[T('dashBidsFollow'),bFollow]],val:fmtV(totalVal),valLabel:T('valTotal')},
    {t:T('dashCust'),big:cust.length,sub:[[T('dashCustNew'),cNewJul],[T('dashCustHigh'),cHigh]]},
    {t:T('dashInter'),big:proj.length,sub:[[T('dashInterJul'),iJul]]},
    {t:T('dashChamb'),big:chambers.length,sub:[[T('dashChambUpc'),chUpc]]},
  ];

  $('#dashStats').innerHTML=stats.map(s=>`
    <div class="stat" onclick="switchTab('${s.t.includes('投标')||s.t.includes('Bids')?'bids':s.t.includes('客户')||s.t.includes('Customer')?'customers':s.t.includes('互动')||s.t.includes('Inter')?'inter':'chambers'}')">
      <div class="h">${s.t}</div>
      <div class="big">${s.big}</div>
      <div class="sub">${s.sub.map(x=>`<span>${x[0]}<b>${x[1]||0}</b></span>`).join('')}${s.val?`<span>${s.valLabel}<b>${s.val}</b></span>`:''}</div>
    </div>`).join('');

  // Reminders
  const urgent=tasks
    .filter(t=>t.status&&!/完成|Completed/i.test(t.status||''))
    .map(t=>({t,dl:daysLeft(t.nextActionDate||t.interactionDate||'')}))
    .filter(x=>x.dl<=7)
    .sort((a,b)=>a.dl-b.dl)
    .slice(0,5);

  if(urgent.length){
    $('#dashReminders').innerHTML=urgent.map(x=>{
      const isOv=x.dl<0,isD2=x.dl<=2&&!isOv;
      const cls=isOv?'red':isD2?'':'';
      const tag=isOv?(lang==='zh'?'逾期 '+Math.abs(x.dl)+'天':x.dl===-1?'1d overdue':Math.abs(x.dl)+'d overdue'):x.dl===0?(lang==='zh'?'今日到期':'Due today'):(lang==='zh'?x.dl+'天':x.dl+'d');
      return `<div class="banner ${cls}"><span class="msg"><b>${esc(x.t.customerName||'?')} — ${esc(x.t.nextStep||x.t.content||'?')}</b></span><span class="tag ${isOv?'ov':isD2?'d2':''}">${tag}</span></div>`;
    }).join('');
  } else {
    $('#dashReminders').innerHTML=`<div class="empty" style="padding:18px 0">${T('noRemind')}</div>`;
  }

  // Recent Activity
  const acts=[];
  proj.slice(-5).reverse().forEach(p=>acts.push({ic:'💬',txt:p.customerName||'?',sub:p.interactionType||p.content||'?',dt:p.interactionDate||''}));
  chambers.slice(-4).reverse().forEach(c=>acts.push({ic:'🏛️',txt:c.chamberName||'?',sub:c.topic||'?',dt:c.attendanceDate||''}));
  if(acts.length){
    $('#dashActivity').innerHTML=acts.map(a=>`
      <div class="act">
        <div class="ic">${a.ic}</div>
        <div class="tx"><div class="title">${esc(a.txt)}</div><div class="sub">${esc(a.sub)}</div></div>
        <div class="dt">${fmt(a.dt)}</div>
      </div>`).join('');
  } else {
    $('#dashActivity').innerHTML=`<div class="empty" style="padding:18px 0">${T('noData')}</div>`;
  }
}

function renderBids(){
  const arr=APP.data.bids||[];
  const q=$('#bidSearch').value.toLowerCase().trim();
  const f=$('#bidFilter').value;
  let list=arr.filter(b=>{
    const okQ=!q||(b.customerName||'').toLowerCase().includes(q)||(b.projectName||'').toLowerCase().includes(q)||(b.location||'').toLowerCase().includes(q)||(b.personInCharge||'').toLowerCase().includes(q)||(b.email||'').toLowerCase().includes(q);
    const sc=b.stageContent||b.stage||'';
    const cls=stageMap[sc]||stageMap2[sc]||'other';
    let okF=true;
    if(f==='Bidding')okF=(cls==='bidding'&&!b.inactive);
    else if(f==='Tracking')okF=(cls==='tracking'&&!b.inactive);
    else if(f==='Other')okF=(cls==='other');
    return okQ&&okF;
  });

  if(!list.length){$('#listBids').innerHTML=`<div class="empty">${T('noData')}</div>`;return;}
  $('#listBids').innerHTML=list.map(b=>{
    const sc=b.stageContent||b.stage||'—';
    const scCls=stageMap[sc]||stageMap2[sc]||'Grey';
    const val=fmtV(b.estimatedValue);
    const dl=daysLeft(b.nextActionDate||b.trackDate);
    const dlLbl=dl<0?(lang==='zh'?'逾期 '+Math.abs(dl):Math.abs(dl)+'d overdue'):dl===0?(lang==='zh'?'今日':''):(lang==='zh'?dl+'天':dl+'d');
    const dlCls=dl<0?'Red':dl<=2?'Orange':dl<=7?'Yellow':'Grey';
    return `<div class="item" onclick="openForm('bids','${b.id}')">
      <div class="row1"><div class="name">${esc(b.projectName||b.customerName||'—')}</div>${pill(scCls,sc)}</div>
      <div class="meta">
        <span>👤 <b>${esc(b.customerName||'—')}</b></span>
        <span>📍 ${esc(b.location||'—')}</span>
        <span>📅 ${fmt(b.trackDate)}</span>
        <span>💰 ${val}</span>
        ${b.nextActionDate?`<span>⏱ <b class="p-${dlCls}" style="background:rgba(0,0,0,0)">${dlLbl}</b></span>`:''}
      </div>
    </div>`;
  }).join('');
}

function getWeekRange(offset){
  var now = new Date();
  var dow = now.getDay();
  var monday = new Date(now);
  if(dow === 0) monday.setDate(now.getDate() - 6);
  else if(dow > 1) monday.setDate(now.getDate() - (dow - 1));
  monday.setHours(0,0,0,0);
  monday.setDate(monday.getDate() + offset * 7);
  var sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  sunday.setHours(23,59,59,999);
  var jan1 = new Date(now.getFullYear(), 0, 1);
  var daysSinceJan1Mon = Math.floor((monday - jan1) / 86400000);
  var week = Math.floor(daysSinceJan1Mon / 7) + 1 + offset;
  return { monday: monday, sunday: sunday, week: week, year: monday.getFullYear() };
}

function inWeek(dateStr, weekRange){
  if(!dateStr) return false;
  var d = new Date(dateStr);
  if(isNaN(d)) return false;
  return d >= weekRange.monday && d <= weekRange.sunday;
}

function fmtVND(v){
  if(!v||v<=0) return '¥—';
  var b = Math.round(v/1e9*10)/10;
  return b>=100?('¥'+Math.round(b)+'B'):('¥~'+b+'B');
}

function wrUpdateTask(idx,field,val){
  var wr = getWeekRange(reportWeekOffset);
  var wrKey = wr.year+'-W'+wr.week;
  var tasks = APP.data.weeklyReports.users[selectedPerson][wrKey].tasks||[];
  if(tasks[idx-1]){
    tasks[idx-1][field]=val;
    if(field==='planStart'||field==='planEnd') renderReport();
  }
}
function wrDeleteTask(idx){
  var wr = getWeekRange(reportWeekOffset);
  var wrKey = wr.year+'-W'+wr.week;
  var tasks = APP.data.weeklyReports.users[selectedPerson][wrKey].tasks||[];
  tasks.splice(idx-1,1);
  renderReport();
}
function wrAddTask(){
  var wr = getWeekRange(reportWeekOffset);
  var wrKey = wr.year+'-W'+wr.week;
  if(!APP.data.weeklyReports.users[selectedPerson][wrKey]) APP.data.weeklyReports.users[selectedPerson][wrKey]={tasks:[]};
  APP.data.weeklyReports.users[selectedPerson][wrKey].tasks.push({name:'',planStart:fmtD(wr.monday),planEnd:fmtD(wr.sunday),type:'PLAN',status:'Pending'});
  renderReport();
}

// ═══════════════════════════════════════════════════════
//  FORM OPEN / CLOSE / RENDER / SAVE
// ═══════════════════════════════════════════════════════
function openForm(mod,id){
  curMod=mod;curId=id||null;
  const spec=FORMS[mod]||[];
  const isEdit=!!id;
  const titleAdd={bids:lang==='zh'?'新增投标':'Add Bid',customers:lang==='zh'?'新增客户':'Add Customer',inter:lang==='zh'?'新增互动':'Add Interaction',chambers:lang==='zh'?'新增商会':'Add Chamber'};
  const titleEdit={bids:lang==='zh'?'编辑投标':'Edit Bid',customers:lang==='zh'?'编辑客户':'Edit Customer',inter:lang==='zh'?'编辑互动':'Edit Interaction',chambers:lang==='zh'?'编辑商会':'Edit Chamber'};
  $('#formTitle').textContent=isEdit?titleEdit[mod]:titleAdd[mod];

  let html='';
  spec.forEach(fld=>{
    if(fld.type==='hidden'){
      html+=`<input type="hidden" data-field="${fld.f}" id="ff_${fld.f}">`;
      return;
    }
    const label=T(fld.t)+(fld.req?' <span class="req">*</span>':'');
    if(fld.type==='select'){
      const opts=(fld.opts||[]).map(o=>`<option value="${T(o)}">${T(o)}</option>`).join('');
      html+=`<div class="fld"><label>${label}</label><select data-field="${fld.f}">${opts}</select></div>`;
    } else if(fld.type==='textarea'){
      html+=`<div class="fld"><label>${label}</label><textarea data-field="${fld.f}" rows="3"></textarea></div>`;
    } else {
      html+=`<div class="fld"><label>${label}</label><input type="${fld.type||'text'}" data-field="${fld.f}"></div>`;
    }
  });

  html+=`<div class="btnrow">
    <button type="button" class="btn danger" onclick="doDelete()" style="display:${isEdit?'flex':'none'}">${T('btnDel')}</button>
    <button type="button" class="btn ghost" onclick="closeForm()">${T('btnCancel')}</button>
    <button type="submit" class="btn primary">${T('btnSave')}</button>
  </div>`;
  $('#formBody').innerHTML=html;

  // Prefill edit data
  if(isEdit){
    const rec=getArr(mod).find(x=>x.id===id);
    if(rec){
      spec.forEach(fld=>{
        const el=$(`[data-field="${fld.f}"]`);
        if(el&&rec[fld.f]!=null)el.value=rec[fld.f];
      });
    }
  } else {
    // Default dates
    spec.forEach(fld=>{
      if(fld.type==='date'){
        const el=$(`[data-field="${fld.f}"]`);
        if(el&&!el.value)el.value=TODAY_STR;
      }
    });
  }

  $('#modal').classList.add('show');
  // scroll top
  $('.sheet').scrollTop=0;
}

function closeForm(){$('#modal').classList.remove('show');curMod=null;curId=null;}

function doSave(){
  if(!curMod)return;
  const spec=FORMS[curMod];
  const obj={};
  let missing=[];
  spec.forEach(fld=>{
    if(fld.type==='hidden')return;
    const el=$(`[data-field="${fld.f}"]`);
    const v=el?el.value.trim():'';
    if(fld.req&&!v){missing.push(T(fld.t));}
    obj[fld.f]=fld.type==='number'?Number(v)||0:v;
  });
  if(missing.length){toast(lang==='zh'?'必填：'+missing.join(', '):'Required: '+missing.join(', '),true);return;}

  // Sync stage → stageContent (critical for web-app filter)
  if(curMod==='bids'){
    obj.stageContent=obj.stage||obj.stageContent||'';
    // Default trackDate to today if new
    if(!obj.trackDate)obj.trackDate=TODAY_STR;
  }
  if(curMod==='customers'&&!obj.createdDate)obj.createdDate=TODAY_STR;
  if(curMod==='inter'&&!obj.interactionDate)obj.interactionDate=TODAY_STR;
  if(curMod==='chambers'&&!obj.attendanceDate)obj.attendanceDate=TODAY_STR;

  const arr=getArr(curMod);
  if(curId){
    const idx=arr.findIndex(x=>x.id===curId);
    if(idx>=0){obj.id=curId;arr[idx]={...arr[idx],...obj};}
  } else {
    obj.id=uid();
    arr.push(obj);
  }
  saveData().then(()=>{closeForm();renderAll();renderScreen(curTab);toast((lang==='zh'?'已保存 ✓':'Saved ✓'),false);});
}

function doDelete(){
  if(!curMod||!curId)return;
  if(!confirm(lang==='zh'?'确定删除这条记录？':'Delete this record?'))return;
  const arr=getArr(curMod);
  const idx=arr.findIndex(x=>x.id===curId);
  if(idx>=0)arr.splice(idx,1);
  saveData().then(()=>{closeForm();renderAll();renderScreen(curTab);toast((lang==='zh'?'已删除 ✓':'Deleted ✓'),false);});
}

// ═══════════════════════════════════════════════════════

function bindSearch(id,renderFn){
  const el=$(id);
  if(!el)return;
  el.addEventListener('input',()=>renderFn());
  el.addEventListener('change',()=>renderFn());
}
