<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="mgd-icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MGD BMS">
<link rel="icon" type="image/png" href="mgd-icon-192.png">
<title>MGD BMS · View</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0E1116;--panel:#161B22;--card:#1C2330;--card2:#243040;
  --line:#2D3A4A;--txt:#E6EDF3;--mut:#8B949E;--acc:#00C7B7;--acc2:#009E92;
  --red:#F85149;--org:#FF8C42;--yel:#E3B341;--grn:#3FB950;--blu:#58A6FF;--gry:#6E7681;--pur:#BC8CFF;
}
html,body{margin:0;padding:0;background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;font-size:14px;overflow-x:hidden}
#app{max-width:430px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative;display:flex;flex-direction:column}

/* Top Bar */
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:8px;padding:10px 14px;background:linear-gradient(180deg,#11161D,#0E1116);border-bottom:1px solid var(--line)}
.topbar .logo{font-size:17px;font-weight:700;flex:1;white-space:nowrap}
.topbar .logo .dot{color:var(--acc)}
.conn{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mut);white-space:nowrap}
.conn .led{width:8px;height:8px;border-radius:50%;background:var(--gry)}
.conn .led.on{background:var(--grn);box-shadow:0 0 6px var(--grn)}
.conn .led.err{background:var(--red)}

/* Bottom Nav */
.tabnav{position:sticky;top:0;z-index:20;display:flex;background:#0B0E13;border-bottom:1px solid var(--line);padding:5px 2px}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:5px 0;color:var(--mut);font-size:10px;cursor:pointer;position:relative;user-select:none}
.tab .ti{font-size:20px;line-height:1}
.tab.active{color:var(--acc)}
.tab .badge{position:absolute;top:1px;right:50%;margin-right:-14px;background:var(--acc);color:#04201d;font-size:9px;font-weight:700;border-radius:9px;padding:0 5px;min-width:15px;text-align:center;display:none}
.tab .badge.warn{background:var(--org);color:#1a0a00}
.tab .badge.danger{background:var(--red);color:#1a0000}

/* Screens */
.screen{flex:1;overflow-y:auto;padding:0 0 20px;display:none}
.screen.active{display:block}

/* Home */
.home-scroll{padding:10px 14px}
.sec-title{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.8px;margin:16px 0 7px;font-weight:600}
.sec-title:first-child{margin-top:2px}

/* Banner */
.banner{background:linear-gradient(135deg,#3a1d00,#2a1500);border:1px solid var(--org);color:#ffd9b0;border-radius:12px;padding:9px 12px;margin:6px 0;font-size:12px;display:flex;align-items:center;gap:8px}
.banner.red{background:linear-gradient(135deg,#3a0000,#2a0000);border-color:var(--red);color:#ffb3ae}
.banner.alarm{background:linear-gradient(135deg,#4a0000,#3a0000);border-color:#ff4444;color:#ff8888;animation:pulse 2s infinite}
@keyframes pulse{0%{opacity:.85}50%{opacity:1}100%{opacity:.85}}
.banner .msg{flex:1;line-height:1.4}
.banner .tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;white-space:nowrap}
.banner .tag.ov{background:rgba(248,81,73,.25);color:var(--red)}
.banner .tag.d2{background:rgba(255,140,66,.25);color:var(--org)}

/* Stat Grid */
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.stat{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 12px}
.stat.full{grid-column:1/-1}
.stat .h{font-size:11px;color:var(--mut);font-weight:600;margin-bottom:4px}
.stat .big{font-size:28px;font-weight:700;margin:2px 0}
.stat .sub{display:flex;flex-wrap:wrap;gap:6px 10px;font-size:11px;color:var(--mut);margin-top:3px}
.stat .sub b{color:var(--txt);font-weight:600}

/* Activity Feed */
.activity{background:var(--card);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.act{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--line)}
.act:last-child{border-bottom:none}
.act .ic{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;background:var(--card2);flex-shrink:0}
.act .tx{flex:1;min-width:0}
.act .tx .title{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.act .tx .sub{font-size:11px;color:var(--mut);margin-top:1px}
.act .dt{font-size:11px;color:var(--mut);white-space:nowrap;flex-shrink:0}

/* List & Items */
.screen-head{display:flex;align-items:center;padding:12px 14px 6px;gap:10px}
.screen-head h2{flex:1;margin:0;font-size:18px;font-weight:700}
.screen-head .count{font-size:12px;color:var(--mut);font-weight:400}
.search{display:flex;gap:8px;margin:0 14px 10px;flex-wrap:wrap}
.search input{flex:1;min-width:0;background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:9px 11px;font-size:13px}
.search select{background:var(--card);border:1px solid var(--line);color:var(--txt);border-radius:10px;padding:9px 8px;font-size:13px}
.list{padding:0 14px;display:flex;flex-direction:column;gap:9px}
.item{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:12px 14px;cursor:default;transition:border-color .15s}
.item.clk{cursor:pointer}
.item.clk:active{border-color:var(--acc);background:var(--card2)}
.item .row1{display:flex;align-items:center;gap:7px;margin-bottom:5px;min-width:0}
.item .name{font-weight:600;font-size:14px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.item .meta{font-size:12px;color:var(--mut);display:flex;flex-wrap:wrap;gap:3px 10px}
.item .meta b{color:var(--txt);font-weight:600}

/* Pills */
.pill{font-size:11px;font-weight:700;padding:2px 9px;border-radius:20px;white-space:nowrap;display:inline-block}
.p-Bidding,.p-Blue,.p-Upcoming{background:rgba(88,166,255,.18);color:var(--blu)}
.p-Won,.p-Attended,.p-Completed,.p-Green,.p-ontime{background:rgba(63,185,80,.18);color:var(--grn)}
.p-Lost,.p-Overdue,.p-Red,.p-delay{background:rgba(248,81,73,.18);color:var(--red)}
.p-Pending,.p-Yellow,.p-progress{background:rgba(227,179,65,.18);color:var(--yel)}
.p-Following,.p-Purple,.p-Reviewing,.p-Data,.p-Reviewing{background:rgba(188,140,255,.18);color:var(--pur)}
.p-High{background:rgba(248,81,73,.18);color:var(--red)}
.p-Medium{background:rgba(255,140,66,.18);color:var(--org)}
.p-Low{background:rgba(110,118,129,.20);color:var(--gry)}

/* Summary Cards */
.summary-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 14px 12px}
.summary-cards .sc{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px;text-align:center}
.summary-cards .sc .sc-n{font-size:20px;font-weight:700}
.summary-cards .sc .sc-l{font-size:10px;color:var(--mut);margin-top:2px}

/* Detail Drawer */
.drawer{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.65);display:none;align-items:flex-end}
.drawer.show{display:flex}
.drawer-inner{background:var(--panel);width:100%;max-width:430px;margin:0 auto;border-radius:18px 18px 0 0;max-height:85vh;overflow-y:auto;padding:16px 16px 32px;border-top:1px solid var(--line)}
.drawer-inner .dh{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:16px;font-weight:700}
.drawer-inner .dh .x{margin-left:auto;color:var(--mut);cursor:pointer;font-size:22px;font-weight:400;line-height:1}
.drawer-inner .dr{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;font-size:13px;line-height:1.7}
.drawer-inner .dr .dl{color:var(--mut);font-weight:600}
.drawer-inner .dr .dv{color:var(--txt)}
.drawer-inner .dr .full{grid-column:1/-1}

/* Person Tabs */
.person-tabs{display:flex;gap:5px;margin:0 14px 10px}
.person-tab{flex:1;padding:8px;border-radius:10px;border:1px solid var(--line);background:var(--card);color:var(--mut);font-size:12px;font-weight:600;text-align:center;cursor:pointer}
.person-tab.active{background:rgba(0,199,183,.12);color:var(--acc);border-color:var(--acc)}
.week-nav{display:flex;align-items:center;justify-content:center;gap:12px;padding:6px 0 10px;font-size:12px;color:var(--mut)}
.week-nav button{background:var(--card);border:1px solid var(--line);border-radius:6px;color:var(--acc);padding:5px 12px;font-size:14px;cursor:pointer}
.week-nav .w-label{color:var(--txt);font-weight:600;min-width:130px;text-align:center}
.wr-task{padding:8px 12px;margin-bottom:7px}
.wr-task .wr-title{font-weight:600;font-size:13px;margin-bottom:3px}
.wr-task .wr-meta{font-size:11px;color:var(--mut);display:flex;gap:12px;flex-wrap:wrap}
.wr-task .wr-bar{height:4px;border-radius:2px;margin-top:6px;background:rgba(255,255,255,.08)}
.wr-task .wr-bar-inner{height:4px;border-radius:2px;transition:width .2s}
.wr-task .wr-pr,.wr-task .wr-note{margin-top:4px;font-size:11px}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);z-index:60;background:var(--card2);border:1px solid var(--line);color:var(--txt);padding:10px 18px;border-radius:24px;font-size:13px;opacity:0;transition:.25s;pointer-events:none;max-width:90%;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Empty */
.empty{text-align:center;color:var(--mut);padding:36px 0;font-size:13px;line-height:1.6}
</style>
</head>
<body>
<div id="app">

  <!-- ══ Top Bar ══ -->
  <div class="topbar">
    <div class="logo">🔄 MGD<span class="dot">·</span>BMS</div>
    <div class="conn"><span class="led" id="led"></span><span id="connTxt">—</span></div>
  </div>

  <!-- ══ Tab Nav (top) ══ -->
  <div class="tabnav">
    <div class="tab active" data-tab="home"><div class="ti">🏠</div>Home</div>
    <div class="tab" data-tab="bids"><div class="ti">📋</div>Bids<span class="badge danger" id="b-bids"></span></div>
    <div class="tab" data-tab="customers"><div class="ti">👥</div>Clients</div>
    <div class="tab" data-tab="weekly"><div class="ti">📑</div>Weekly<span class="badge warn" id="b-weekly"></span></div>
    <div class="tab" data-tab="chambers"><div class="ti">🏛️</div>Chamber<span class="badge warn" id="b-chamb"></span></div>
  </div>

  <!-- ══ HOME ══ -->
  <div class="screen active" id="scr-home">
    <div class="home-scroll">
      <div style="font-size:13px;color:var(--mut);margin:6px 0 4px" id="homeGreet"></div>
      <div id="alertSection"></div>
      <div class="statgrid" id="statGrid"></div>
    </div>
  </div>

  <!-- ══ BIDS ══ -->
  <div class="screen" id="scr-bids">
    <div class="screen-head"><h2>Bid Projects</h2><span class="count" id="bidCount"></span></div>
    <div class="search">
      <input id="bidSearch" placeholder="🔍 Search...">
      <select id="bidFilter"><option value="">All Active</option><option value="Bidding">Bidding</option><option value="Following">Following</option><option value="Overdue">Overdue</option></select>
    </div>
    <div id="summaryBids" class="summary-cards"></div>
    <div class="list" id="listBids"></div>
  </div>

  <!-- ══ CUSTOMERS ══ -->
  <div class="screen" id="scr-customers">
    <div class="screen-head"><h2>Customer Contracts</h2><span class="count" id="custCount"></span></div>
    <div class="search">
      <input id="custSearch" placeholder="🔍 Search...">
      <select id="custFilter"><option value="">All</option><option value="High">High</option><option value="Medium">Medium</option><option value="Low">Low</option></select>
    </div>
    <div id="summaryCust" class="summary-cards"></div>
    <div class="list" id="listCust"></div>
  </div>

  <!-- ══ WEEKLY REPORT ══ -->
  <div class="screen" id="scr-weekly">
    <div class="screen-head"><h2>Weekly Report</h2></div>
    <!-- Person Tabs -->
    <div class="person-tabs" id="wrPersonTabs"></div>
    <!-- Week Navigator -->
    <div class="week-nav">
      <button onclick="wrChangeWeek(-1)">‹</button>
      <span class="w-label" id="wrWeekLabel">Week 28</span>
      <button onclick="wrChangeWeek(1)">›</button>
    </div>
    <!-- Summary -->
    <div class="summary-cards" id="wrSummaryCards"></div>
    <!-- Tasks -->
    <div class="list" id="wrTaskList"></div>
  </div>

  <!-- ══ CHAMBERS ══ -->
  <div class="screen" id="scr-chambers">
    <div class="screen-head"><h2>Chamber Events</h2><span class="count" id="chambCount"></span></div>
    <div class="search">
      <input id="chambSearch" placeholder="🔍 Search...">
      <select id="chambFilter"><option value="">All</option><option value="Upcoming">Upcoming</option><option value="Attended">Attended</option></select>
    </div>
    <div id="summaryChamb" class="summary-cards"></div>
    <div class="list" id="listChamb"></div>
  </div>

  <!-- ══ Tab Nav (top) ══ -->
  <!-- ══ Detail Drawer ══ -->
  <div class="drawer" id="drawer" onclick="if(event.target===this)closeDrawer()">
    <div class="drawer-inner" onclick="event.stopPropagation()">
      <div class="dh"><span id="drawerTitle">Details</span><span class="x" onclick="closeDrawer()">✕</span></div>
      <div class="dr" id="drawerBody"></div>
    </div>
  </div>

  <!-- ══ Toast ══ -->
  <div class="toast" id="toast"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script>
// ═══════════════════════════════════════════════════════
//  FIREBASE — Read-only
// ═══════════════════════════════════════════════════════
firebase.initializeApp({
  apiKey: "AIzaSyAVmd-Fn6n0ZUQzT6PgI52VKNLqO1qdeJE",
  authDomain: "mgd-bms.firebaseapp.com",
  projectId: "mgd-bms",
  storageBucket: "mgd-bms.firebasestorage.app",
  messagingSenderId: "236930354313",
  appId: "1:236930354313:web:cf114889a3f31de7d6ca58"
});
const APP={db:null,data:{bids:[],customers:[],projects:[],chambers:[]}};
const TODAY=new Date();const TODAY_STR=TODAY.toISOString().slice(0,10);
const WR_USERS=[{id:'tony',name:'Tony Cheong',color:'#3b82f6'},{id:'quoc',name:'Mr. Quoc',color:'#22c55e'},{id:'huong',name:'Ms. Huong',color:'#f59e0b'}];
var wrSelUser='tony',wrWeekOffset=0,wrWeekNum=28;

// ═══════════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════════
const $=s=>document.querySelector(s);
const esc=s=>(s==null?'':String(s)).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const fmt=d=>{if(!d)return'—';const d2=new Date(d+"T00:00:00");if(isNaN(d2))return d;return d2.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});};
const daysLeft=d=>{if(!d)return 9999;const d2=new Date(d+"T00:00:00");if(isNaN(d2))return 9999;return Math.round((d2-TODAY)/86400000);};
const sameMonth=(d,ref)=>{if(!d)return false;const d2=new Date(d+"T00:00:00");if(isNaN(d2))return false;return ref?d2.getMonth()===ref.getMonth()&&d2.getFullYear()===ref.getFullYear():d2.getMonth()===TODAY.getMonth()&&d2.getFullYear()===TODAY.getFullYear();};
const fmtV=n=>{if(!n||isNaN(n))return'—';const v=Number(n);if(v>=1e9)return(v/1e9).toFixed(1).replace(/\.0$/,'')+'B';if(v>=1e6)return(v/1e6).toFixed(1).replace(/\.0$/,'')+'M';if(v>=1e3)return(v/1e3).toFixed(1).replace(/\.0$/,'')+'K';return v.toLocaleString();};
const pill=(cls,txt)=>'<span class="pill p-'+esc(cls)+'">'+esc(txt)+'</span>';
const stageCls=s=>{const m={'Bidding':'Bidding','投标中':'Bidding','Following':'Following','跟踪':'Following','Reviewing':'Reviewing','评审中':'Reviewing','Won':'Won','中标':'Won','Data Collection':'Data','资格审核':'Data','PQ':'Data'};return m[s]||'Grey';};

function delayLabel(dl){
  if(dl<0) return {txt:Math.abs(dl)+'d overdue',cls:'ov'};
  if(dl===0) return {txt:'Due today',cls:'d2'};
  if(dl<=2) return {txt:dl+'d',cls:'d2'};
  return {txt:dl+'d',cls:''};
}
function pctClass(p){var n=parseInt(p)||0;if(n>=100)return'Completed';if(n>=70)return'progress';return'delay';}

function getWeekNumber(d){
  d=new Date(d);var y=d.getFullYear();
  var jan1=new Date(y,0,1);
  var daysToSat=(6-jan1.getDay()+7)%7;
  var week1Sat=new Date(jan1);week1Sat.setDate(jan1.getDate()+daysToSat);
  var diff=Math.floor((d-week1Sat)/86400000);
  return Math.max(1,Math.ceil((diff+1)/7)+1);
}
function getWeekDates(wn,y){y=y||2026;
  var jan1=new Date(y,0,1);var dts=(6-jan1.getDay()+7)%7;
  var w1s=new Date(jan1);w1s.setDate(jan1.getDate()+dts);
  var ts=new Date(w1s);ts.setDate(w1s.getDate()+(wn-2)*7);
  var tns=new Date(ts);tns.setDate(ts.getDate()+7);
  var m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return{start:m[ts.getMonth()]+' '+ts.getDate(),end:m[tns.getMonth()]+' '+tns.getDate()+', '+tns.getFullYear()};
}

// ═══════════════════════════════════════════════════════
//  FIREBASE
// ═══════════════════════════════════════════════════════
function setConn(s){
  const led=$('#led'),txt=$('#connTxt');
  led.className='led'+(s==='online'?' on':s==='err'?' err':'');
  txt.textContent=s==='online'?'Synced':s==='err'?'Offline':'…';
}
async function initFirebase(){
  APP.db=firebase.firestore();setConn('connecting');
  try{await firebase.auth().signInWithEmailAndPassword("tong@mgd.com","MGD2024!");}
  catch(e){try{await firebase.auth().createUserWithEmailAndPassword("tong@mgd.com","MGD2024!");}catch(e2){}}
  APP.db.collection('bms_data').doc('master').onSnapshot(snap=>{
    if(snap.exists){APP.data=snap.data().data||{};ensureArrays();setConn('online');renderAll();}
  },err=>{setConn('err');});
  try{
    const snap=await APP.db.collection('bms_data').doc('master').get();
    if(snap.exists){APP.data=snap.data().data||{};ensureArrays();setConn('online');renderAll();}
    else{APP.data={};ensureArrays();setConn('online');renderAll();}
  }catch(e){setConn('err');}
  // Set initial week
  wrWeekNum=getWeekNumber(TODAY);
  renderWR();
}
function ensureArrays(){
  ['bids','customers','projects','chambers'].forEach(k=>{if(!APP.data[k])APP.data[k]=[];});
  if(!APP.data.weeklyReports)APP.data.weeklyReports={users:{}};
  WR_USERS.forEach(u=>{if(!APP.data.weeklyReports.users[u.id])APP.data.weeklyReports.users[u.id]={};});
}

// ═══════════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════════
let curTab='home';
function switchTab(tab){
  curTab=tab;
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  $('#scr-'+tab).classList.add('active');
  $('.tab[data-tab="'+tab+'"]')?.classList.add('active');
  if(tab==='weekly')renderWR();
  if(tab!=='home')renderScreen(tab);
  window.scrollTo(0,0);
}

// ═══════════════════════════════════════════════════════
//  DRAWER
// ═══════════════════════════════════════════════════════
function showDrawer(type,item){
  if(!item)return;
  var rows=[],title=item.projectName||item.companyName||item.chamberName||'Details';
  if(type==='bid'){rows=[{l:'Customer',v:item.customerName},{l:'Project',v:item.projectName},{l:'Location',v:item.location},{l:'Land Area',v:item.landArea},{l:'Track Date',v:fmt(item.trackDate)},{l:'Stage',v:item.stageContent||item.stage},{l:'Next Action Date',v:fmt(item.nextActionDate)},{l:'Next Action',v:item.nextActionContent},{l:'PIC',v:item.personInCharge},{l:'Email',v:item.email},{l:'Category',v:item.category},{l:'Est. Value',v:fmtV(item.estimatedValue)},{l:'Notes',v:item.notes,full:true}];}
  else if(type==='customer'){rows=[{l:'Company',v:item.companyName},{l:'Business',v:item.companyBusiness},{l:'Contact',v:item.contactPerson},{l:'Position',v:item.position},{l:'Phone',v:item.phone},{l:'Email',v:item.email},{l:'Country',v:item.country},{l:'Priority',v:item.priority}];}
  else if(type==='chamber'){rows=[{l:'Chamber',v:item.chamberName},{l:'Topic',v:item.topic},{l:'Date',v:fmt(item.attendanceDate)},{l:'Location',v:item.attendanceLocation},{l:'Contact',v:item.contactPerson},{l:'Phone',v:item.phone},{l:'Country',v:item.country},{l:'Notes',v:item.notes,full:true}];}
  $('#drawerTitle').textContent=title;
  $('#drawerBody').innerHTML=rows.map(r=>{if(!r.v)return'';return'<div'+(r.full?' class="full"':'')+'><span class="dl">'+esc(r.l)+'</span><span class="dv">'+esc(String(r.v))+'</span></div>';}).join('');
  $('#drawer').classList.add('show');
}
function closeDrawer(){$('#drawer').classList.remove('show');}

// ═══════════════════════════════════════════════════════
//  RENDER ALL
// ═══════════════════════════════════════════════════════
function renderAll(){
  const bids=APP.data.bids||[];
  const cust=APP.data.customers||[];
  const proj=APP.data.projects||[];
  const chambers=APP.data.chambers||[];

  // Greeting
  const m=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][TODAY.getMonth()];
  $('#homeGreet').textContent='Overview · '+m+' '+TODAY.getFullYear();

  // ── Alerts ──
  var urgent=[],alarms=[];
  const activeBids=bids=>bids.filter(b=>/(Bidding|Following)/i.test(b.stageContent||b.stage||'')&&!b.inactive&&!/Stopped|Cancelled/i.test(b.stage||b.stageContent||''));
  activeBids(bids).forEach(b=>{if(!b.nextActionDate)return;const dl=daysLeft(b.nextActionDate);if(dl<0&&Math.abs(dl)>7)alarms.push({icon:'🚨',name:b.projectName||b.customerName,tag:Math.abs(dl)+'d',cls:'alarm'});});
  proj.forEach(p=>{const dl=daysLeft(p.nextActionDate||p.interactionDate);if(dl<0&&!/Completed/i.test(p.status||''))urgent.push({icon:'💬',name:p.customerName||'?',tag:Math.abs(dl)+'d overdue',cls:'red'});});
  chambers.forEach(c=>{const dl=daysLeft(c.attendanceDate);if(dl>0&&dl<=7)urgent.push({icon:'🏛️',name:c.chamberName,tag:dl+'d',cls:''});});
  // Add overdue WR tasks to alerts
  var wrOverdue=collectOverdueWR();
  wrOverdue.forEach(t=>{urgent.push({icon:'📑',name:t.name+' ('+t.user+')',tag:Math.abs(t.ov)+'d overdue',cls:'red'});});
  urgent.sort((a,b)=>a.cls===b.cls?0:a.cls?'a':'b').slice(0,8);

  var allAlerts=[].concat(alarms,urgent);
  if(allAlerts.length){
    $('#alertSection').innerHTML=allAlerts.slice(0,10).map(x=>'<div class="banner '+(x.cls||'')+'"><span class="msg">'+x.icon+' <b>'+esc(x.name)+'</b></span><span class="tag '+(x.cls==='alarm'?'ov':(x.cls==='red'?'ov':'d2'))+'">'+esc(x.tag)+'</span></div>').join('');
  } else {
    $('#alertSection').innerHTML='<div class="banner" style="border-color:var(--grn);background:linear-gradient(135deg,#0a2a10,#0e1a12);color:#b0ffb0;"><span class="msg">All clear 🎉</span></div>';
  }

  // ── Delay-only Cards ──
  const activeBidsArr=bids.filter(b=>/(Bidding|Following)/i.test(b.stageContent||b.stage||'')&&!b.inactive&&!/Stopped|Cancelled/i.test(b.stage||b.stageContent||''));
  const bOver=activeBidsArr.filter(b=>{if(!b.nextActionDate)return false;const dl=daysLeft(b.nextActionDate);return dl<0;}).length;
  const bAlarmCount=activeBidsArr.filter(b=>{if(!b.nextActionDate)return false;const dl=daysLeft(b.nextActionDate);return dl<0&&Math.abs(dl)>7;}).length;
  const chUp=chambers.filter(c=>daysLeft(c.attendanceDate)>0).length;
  const custNewMonth=cust.filter(c=>sameMonth(c.createdDate)).length;
  const interMonth=proj.filter(p=>sameMonth(p.interactionDate)).length;
  $('#statGrid').innerHTML=[
    '<div class="stat"><div class="h">🚨 Alarms (>7d overdue)</div><div class="big" style="color:'+(bAlarmCount>0?'var(--red)':'var(--grn)')+'">'+bAlarmCount+'</div></div>',
    '<div class="stat"><div class="h">📋 Overdue Bids</div><div class="big" style="color:'+(bOver>0?'var(--red)':'var(--grn)')+'">'+bOver+'</div></div>',
    '<div class="stat"><div class="h">🏛️ Upcoming Chambers</div><div class="big" style="color:'+(chUp>0?'var(--blu)':'var(--mut)')+'">'+chUp+'</div></div>',
    '<div class="stat"><div class="h">👥 New Clients (Month)</div><div class="big" style="color:'+(custNewMonth>0?'var(--org)':'var(--mut)')+'">'+custNewMonth+'</div></div>',
    '<div class="stat"><div class="h">💬 Interactions (Month)</div><div class="big" style="color:'+(interMonth>0?'var(--yel)':'var(--mut)')+'">'+interMonth+'</div></div>',
    '<div class="stat full"><div class="h">⚠️ WR Overdue Per Person</div><div class="big" style="color:'+(wrOverdue.length>0?'var(--red)':'var(--grn)')+'">'+wrOverdue.length+'</div><div class="sub">'+
      wrOverdue.slice(0,6).map(function(t){return '<span style="font-size:10px">'+esc(t.user)+'<b style="color:var(--red)"> '+Math.abs(t.ov)+'d</b></span>';}).join(' | ')||'—'+
    '</div></div>'
  ].join('');

  // Badges
  var totalBidBadge=bAlarmCount+bOver;
  $('#b-bids').textContent=totalBidBadge>0?totalBidBadge:'';$('#b-bids').style.display=totalBidBadge>0?'inline':'none';$('#b-bids').className='badge'+(totalBidBadge>0?' danger':'');
  var chSoon=chambers.filter(c=>daysLeft(c.attendanceDate)>0&&daysLeft(c.attendanceDate)<=7).length;
  $('#b-chamb').textContent=chSoon>0?chSoon:'';$('#b-chamb').style.display=chSoon>0?'inline':'none';$('#b-chamb').className='badge'+(chSoon>0?' warn':'');
  $('#b-weekly').textContent=wrOverdue.length>0?wrOverdue.length:'';$('#b-weekly').style.display=wrOverdue.length>0?'inline':'none';$('#b-weekly').className='badge'+(wrOverdue.length>0?' danger':'');
}

function renderScreen(tab){
  if(tab==='bids')renderBids();
  else if(tab==='customers')renderCustomers();
  else if(tab==='chambers')renderChambers();
  renderAll();
}

// ═══════════════════════════════════════════════════════
//  WEEKLY REPORT HELPERS — reads from Firebase data
// ═══════════════════════════════════════════════════════
function collectOverdueWR(){
  var out=[];
  if(!APP.data.weeklyReports)return out;
  WR_USERS.forEach(function(u){
    var weeks=APP.data.weeklyReports.users[u.id]||{};
    Object.keys(weeks).forEach(function(wk){
      var wd=weeks[wk];if(!wd||!wd.tasks)return;
      wd.tasks.forEach(function(t){
        if(!t.planEnd)return;
        var dl=daysLeft(t.planEnd);
        if(dl<0){
          var pct=parseInt(t.pct)||0;
          // Completed (pct>=100 or status=Completed) → not overdue
          if(pct>=100||t.taskStatus==='Completed')return;
          out.push({user:u.name,userid:u.id,week:wk,name:t.name||'Unnamed',planEnd:t.planEnd,pct:t.pct,status:t.taskStatus,ov:dl});
        }
      });
    });
  });
  return out.sort((a,b)=>a.ov-b.ov);
}

function wrGetUserWeekData(userId,weekNum){
  var wr=APP.data.weeklyReports;
  if(!wr||!wr.users||!wr.users[userId])return[];
  var wk=wr.users[userId][weekNum];
  return wk&&wk.tasks?wk.tasks:[];
}

function wrChangeWeek(dir){
  wrWeekOffset+=dir;
  renderWR();
}
function wrSelectUser(uid){
  wrSelUser=uid;
  renderWR();
}
function wrWeekLabel(wn){
  var gd=getWeekDates(wn);
  return 'W'+wn+' · '+gd.start+' - '+gd.end;
}

function renderWR(){
  // Person tabs
  var pt='<div class="person-tab '+(wrSelUser==='tony'?'active':'')+'" onclick="wrSelectUser(\'tony\')" style="border-color:'+(wrSelUser==='tony'?'var(--acc)':'var(--line)')+'">Tony</div>'+
    '<div class="person-tab '+(wrSelUser==='quoc'?'active':'')+'" onclick="wrSelectUser(\'quoc\')" style="border-color:'+(wrSelUser==='quoc'?'var(--acc)':'var(--line)')+'">Quoc</div>'+
    '<div class="person-tab '+(wrSelUser==='huong'?'active':'')+'" onclick="wrSelectUser(\'huong\')" style="border-color:'+(wrSelUser==='huong'?'var(--acc)':'var(--line)')+'">Huong</div>';
  $('#wrPersonTabs').innerHTML=pt;

  var wn=wrWeekNum+wrWeekOffset;
  $('#wrWeekLabel').textContent=wrWeekLabel(wn);

  var tasks=wrGetUserWeekData(wrSelUser,wn);
  var total=tasks.length;
  var completed=tasks.filter(function(t){return parseInt(t.pct)>=100||/Completed/i.test(t.taskStatus||'');}).length;
  var delayed=tasks.filter(function(t){
    if(parseInt(t.pct)>=100||/Completed/i.test(t.taskStatus||''))return false;
    return t.planEnd&&daysLeft(t.planEnd)<0;
  }).length;
  var avgPct=tasks.length?Math.round(tasks.reduce(function(s,t){return s+(parseInt(t.pct)||0);},0)/tasks.length):0;

  $('#wrSummaryCards').innerHTML=[
    '<div class="sc"><div class="sc-n">'+total+'</div><div class="sc-l">Tasks</div></div>',
    '<div class="sc"><div class="sc-n" style="color:var(--grn)">'+completed+'</div><div class="sc-l">Completed</div></div>',
    '<div class="sc"><div class="sc-n" style="color:var(--red)">'+delayed+'</div><div class="sc-l">Delayed</div></div>',
    '<div class="sc"><div class="sc-n" style="color:'+(avgPct>=100?'var(--grn)':avgPct>=70?'var(--yel)':'var(--red)')+'">'+avgPct+'%</div><div class="sc-l">Avg Progress</div></div>'
  ].join('');

  if(!tasks.length){
    $('#wrTaskList').innerHTML='<div class="empty">No tasks for this week</div>';
    return;
  }
  $('#wrTaskList').innerHTML=tasks.map(function(t){
    var p=parseInt(t.pct)||0;
    var pCls=pctClass(p);
    var st=/Completed/i.test(t.taskStatus||'')?'Completed':(p>=100?'Completed':p>0?'In Progress':'Pending');
    var stCls=st==='Completed'?'Completed':st==='Delay'||st==='Overdue'?'delay':'progress';
    var dl='';var dlBg='';
    if(t.planEnd && p<100 && st!=='Completed'){
      var d=daysLeft(t.planEnd);
      if(d<0){dl=Math.abs(d)+'d overdue';dlBg='color:var(--red)';stCls='delay';}
      else if(d===0){dl='Due today';dlBg='color:var(--org)';}
      else if(d<=2){dl=d+'d';dlBg='color:var(--org)';}
      else{dl=d+'d';dlBg='color:var(--mut)';}
    }
    return '<div class="item wr-task"><div class="wr-title">'+esc(t.name||'Unnamed')+'</div>'+
      '<div class="wr-meta"><span>📅 '+fmt(t.planStart)+' → '+fmt(t.planEnd)+'</span>'+
      (dl?'<span style="'+dlBg+'">⏱ '+esc(dl)+'</span>':'')+
      '<span>'+pill(stCls,st)+'</span>'+
      '<span><b>'+(t.pct?t.pct+'%':'0%')+'</b></span>'+
      (t.noted?'<span>📝 '+esc(t.noted)+'</span>':'')+
      '</div><div class="wr-bar"><div class="wr-bar-inner" style="width:'+Math.min(100,p)+'%;background:'+(p>=100?'var(--grn)':p>=70?'var(--yel)':'var(--red)')+'"></div></div></div>';
  }).join('');
}

// ═══════════════════════════════════════════════════════
//  BIDS
// ═══════════════════════════════════════════════════════
function renderBids(){
  const arr=APP.data.bids||[];
  const q=$('#bidSearch').value.toLowerCase().trim();
  const f=$('#bidFilter').value;
  // Only show Following or Bidding status (exclude cancelled/stopped)
  let list=arr.filter(b=>{
    const sc=b.stageContent||b.stage||'';
    const keep=/(Bidding|Following)/i.test(sc)&&!b.inactive;
    if(!keep)return false;
    const okQ=!q||(b.projectName||'').toLowerCase().includes(q)||(b.customerName||'').toLowerCase().includes(q)||(b.location||'').toLowerCase().includes(q);
    const cls=/(Bidding)/i.test(sc)?'Bidding':'Following';
    let okF=true;
    if(f==='Bidding')okF=cls==='Bidding';
    else if(f==='Following')okF=cls==='Following';
    else if(f==='Overdue'){if(!b.nextActionDate)okF=false;else{const dl=daysLeft(b.nextActionDate);okF=dl<0;}}
    return okQ&&okF;
  });
  const aB=list.filter(b=>/(Bidding)/i.test(b.stageContent||b.stage||'')).length;
  const oB=list.filter(b=>{if(!b.nextActionDate)return false;const dl=daysLeft(b.nextActionDate);return dl<0;}).length;
  $('#summaryBids').innerHTML=[
    '<div class="sc"><div class="sc-n">'+list.length+'</div><div class="sc-l">Active</div></div>',
    '<div class="sc"><div class="sc-n" style="color:var(--blu)">'+aB+'</div><div class="sc-l">Bidding</div></div>',
    '<div class="sc"><div class="sc-n" style="color:var(--pur)">'+(list.length-aB)+'</div><div class="sc-l">Following</div></div>',
    '<div class="sc"><div class="sc-n" style="color:var(--acc)">'+fmtV(list.reduce((s,b)=>s+(parseFloat(b.estimatedValue)||0),0))+'</div><div class="sc-l">Est. Value</div></div>'
  ].join('');
  $('#bidCount').textContent='('+list.length+')';
  if(!list.length){$('#listBids').innerHTML='<div class="empty">No data</div>';return;}
  $('#listBids').innerHTML=list.map(b=>{
    const sc=b.stageContent||b.stage||'—',cls=stageCls(sc),val=fmtV(b.estimatedValue);
    const dl=b.nextActionDate?daysLeft(b.nextActionDate):9999;
    const dlbl=delayLabel(dl);
    const dlBg=dl<0?'color:var(--red)':dl<=2?'color:var(--org)':'color:var(--mut)';
    return '<div class="item clk" onclick="showDrawer(\'bid\',APP.data.bids.find(x=>x.id===\''+b.id+'\'))">'+
      '<div class="row1"><div class="name">'+esc(b.projectName||b.customerName||'—')+'</div>'+pill(cls,sc)+'</div>'+
      '<div class="meta"><span>👤 <b>'+esc(b.customerName||'—')+'</b></span><span>📍 '+esc(b.location||'—')+'</span><span>💰 '+val+'</span>'+
      (dl<9999?'<span>⏱ <b style="'+dlBg+'">'+esc(dlbl.txt)+'</b></span>':'')+
      '</div></div>';
  }).join('');
}

// ═══════════════════════════════════════════════════════
//  CUSTOMERS
// ═══════════════════════════════════════════════════════
function renderCustomers(){
  const arr=APP.data.customers||[];
  const q=$('#custSearch').value.toLowerCase().trim();
  const f=$('#custFilter').value;
  let list=arr.filter(c=>{
    const okQ=!q||(c.companyName||'').toLowerCase().includes(q)||(c.contactPerson||'').toLowerCase().includes(q)||(c.email||'').toLowerCase().includes(q);
    let okF=true;
    if(f==='High')okF=/High/i.test(c.priority||'');
    else if(f==='Medium')okF=/Medium/i.test(c.priority||'');
    else if(f==='Low')okF=/Low/i.test(c.priority||'');
    return okQ&&okF;
  });
  const high=list.filter(c=>/High/i.test(c.priority||'')).length;
  $('#summaryCust').innerHTML=[
    '<div class="sc"><div class="sc-n">'+list.length+'</div><div class="sc-l">Total</div></div>',
    '<div class="sc"><div class="sc-n" style="color:var(--org)">'+high+'</div><div class="sc-l">High Priority</div></div>'
  ].join('');
  $('#custCount').textContent='('+list.length+')';
  if(!list.length){$('#listCust').innerHTML='<div class="empty">No data</div>';return;}
  $('#listCust').innerHTML=list.map(c=>{
    const pri=c.priority||'';const priCls=/High/i.test(pri)?'High':/Medium/i.test(pri)?'Medium':'Low';
    return '<div class="item clk" onclick="showDrawer(\'customer\',APP.data.customers.find(x=>x.id===\''+c.id+'\'))">'+
      '<div class="row1"><div class="name">'+esc(c.companyName||'—')+'</div>'+pill(priCls,pri)+'</div>'+
      '<div class="meta"><span>👤 <b>'+esc(c.contactPerson||'—')+'</b></span><span>🌐 '+esc(c.country||'—')+'</span><span>📧 '+esc(c.email||'—')+'</span></div></div>';
  }).join('');
}

// ═══════════════════════════════════════════════════════
//  CHAMBERS
// ═══════════════════════════════════════════════════════
function renderChambers(){
  const arr=APP.data.chambers||[];
  const q=$('#chambSearch').value.toLowerCase().trim();
  const f=$('#chambFilter').value;
  let list=arr.filter(c=>{
    const okQ=!q||(c.chamberName||'').toLowerCase().includes(q)||(c.topic||'').toLowerCase().includes(q)||(c.country||'').toLowerCase().includes(q);
    const dl=daysLeft(c.attendanceDate||'');
    let okF=true;
    if(f==='Upcoming')okF=dl>0;
    else if(f==='Attended')okF=dl<=0;
    return okQ&&okF;
  });
  const upcoming=list.filter(c=>daysLeft(c.attendanceDate)>0).length;
  $('#summaryChamb').innerHTML=[
    '<div class="sc"><div class="sc-n">'+list.length+'</div><div class="sc-l">Total</div></div>',
    '<div class="sc"><div class="sc-n" style="color:var(--blu)">'+upcoming+'</div><div class="sc-l">Upcoming</div></div>'
  ].join('');
  $('#chambCount').textContent='('+list.length+')';
  if(!list.length){$('#listChamb').innerHTML='<div class="empty">No data</div>';return;}
  $('#listChamb').innerHTML=list.map(c=>{
    const dl=daysLeft(c.attendanceDate||'');const stCls=dl>0?'Upcoming':'Green';const stLbl=dl>0?'Upcoming':'Attended';
    return '<div class="item clk" onclick="showDrawer(\'chamber\',APP.data.chambers.find(x=>x.id===\''+c.id+'\'))">'+
      '<div class="row1"><div class="name">'+esc(c.chamberName||'—')+'</div>'+pill(stCls,stLbl)+'</div>'+
      '<div class="meta"><span>🏷 '+esc(c.topic||'—')+'</span><span>📅 '+fmt(c.attendanceDate)+'</span><span>📍 '+esc(c.attendanceLocation||c.country||'—')+'</span></div></div>';
  }).join('');
}

// ═══════════════════════════════════════════════════════

function bindSearch(id,fn){const el=$(id);if(!el)return;el.addEventListener('input',fn);el.addEventListener('change',fn);}

// ═══════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded',function(){
  document.querySelectorAll('.tab').forEach(t=>{t.addEventListener('click',function(){switchTab(t.dataset.tab);});});

  bindSearch('#custSearch',renderCustomers);bindSearch('#custFilter',renderCustomers);
  bindSearch('#chambSearch',renderChambers);bindSearch('#chambFilter',renderChambers);
  initFirebase();
});
